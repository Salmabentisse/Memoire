spring.application.name=threat-detector-backend
server.port=8080

# Multipart upload (fichiers CICIDS peuvent être lourds)
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ================================================
# CLE GEMINI — mets ta clé ici et nulle part ailleurs
# ================================================
gemini.api.key=YOUR-GEMINI-API-KEY-HERE

gemini.model=gemini-2.5-flash

# Limites d'analyse
analysis.max-rule-alerts=100
analysis.max-llm-rows=10
